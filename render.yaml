services:
  - type: web
    name: ello-clinic-api
    runtime: docker
    plan: free
    region: virginia
    rootDir: src/ElloClinic.Api
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: ello-clinic-db, property: connectionString }
      - key: JWT_KEY
        generateValue: true
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: CORS_ORIGINS
        value: https://ello-clinic-web.onrender.com
  - type: web
    name: ello-clinic-web
    runtime: static
    rootDir: web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist/ello-clinic/browser
    autoDeployTrigger: checksPass
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /api/*
        destination: https://ello-clinic-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
databases:
  - name: ello-clinic-db
    plan: free
    region: virginia
    databaseName: ello_clinic
    user: ello
    ipAllowList: []
