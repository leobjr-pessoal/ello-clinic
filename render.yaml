services:
  - type: web
    name: ello-clinic-api
    runtime: docker
    plan: free
    region: virginia
    rootDir: src/ElloClinic.Api
    healthCheckPath: /health
    autoDeployTrigger: checksPass
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: ello-clinic-db, property: connectionString }
      - key: JWT_KEY
        generateValue: true
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: CORS_ORIGINS
        value: https://ello-clinic-web.onrender.com
  - type: web
    name: ello-clinic-web
    runtime: static
    rootDir: web
    buildCommand: npm ci && npm run build
    staticPublishPath: dist/ello-clinic/browser
    autoDeployTrigger: checksPass
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://ello-clinic-api.onrender.com"
      - path: /*
        name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=(), payment=(), usb=()"
    routes:
      - type: rewrite
        source: /api/*
        destination: https://ello-clinic-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
databases:
  - name: ello-clinic-db
    plan: free
    region: virginia
    databaseName: ello_clinic
    user: ello
    ipAllowList: []
